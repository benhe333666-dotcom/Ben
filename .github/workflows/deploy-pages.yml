name: 构建并发布人工智能新闻时间线

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 更新新闻数据
        run: npm run update

      - name: 同步新闻数据到仓库
        run: |
          if git diff --quiet -- public/news.json public/sources.json; then
            echo "新闻数据没有变化，跳过提交。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/news.json public/sources.json
          git commit -m "Refresh news data [skip ci]"
          git push

      - name: 构建网站
        run: npm run build

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传发布产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 发布到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
